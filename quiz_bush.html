<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bush That Would Not Burn – Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--fire:#E85D04;--fire-light:#FFBA08;--sand:#FFF3E0;--brown:#7B4A1E;--dark:#3D1A00;--green:#4CAF72;--red:#E05555;--stone:#F5EFE6;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#FFE0B2 0%,#FFCC80 50%,#FFA726 100%);min-height:100vh;overflow-x:hidden}
  .spark{position:fixed;font-size:2rem;opacity:.18;pointer-events:none;animation:float 5s ease-in-out infinite}
  .spark:nth-child(1){top:5%;left:3%;animation-delay:0s}.spark:nth-child(2){top:18%;right:5%;animation-delay:1s;font-size:1.5rem}.spark:nth-child(3){bottom:15%;left:5%;animation-delay:2s}.spark:nth-child(4){bottom:8%;right:4%;animation-delay:3s}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-15px) rotate(5deg)}}
  .container{max-width:680px;margin:0 auto;padding:24px 20px 60px}
  .header{text-align:center;margin-bottom:32px;animation:dropIn .6s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes dropIn{from{transform:translateY(-40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .main-emoji{font-size:4.5rem;display:block;margin-bottom:8px;animation:flicker 1.5s ease-in-out infinite}
  @keyframes flicker{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.1) rotate(2deg)}}
  h1{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--dark);line-height:1.2;text-shadow:2px 2px 0 rgba(255,255,255,.5)}
  .subtitle{font-size:1rem;color:var(--dark);opacity:.75;margin-top:6px;font-weight:600}
  .scripture-badge{display:inline-block;background:var(--dark);color:var(--fire-light);font-size:.75rem;font-weight:700;padding:4px 14px;border-radius:20px;margin-top:10px;letter-spacing:.5px}
  .progress-wrap{background:rgba(255,255,255,.45);border-radius:12px;height:12px;margin-bottom:24px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--fire),var(--fire-light));border-radius:12px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
  .progress-label{text-align:center;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:10px;opacity:.8}
  .card{background:var(--stone);border-radius:24px;padding:28px 24px;box-shadow:0 8px 32px rgba(61,26,0,.15);animation:cardIn .4s cubic-bezier(.34,1.56,.64,1) both;border:2px solid rgba(232,93,4,.15)}
  @keyframes cardIn{from{transform:scale(.92) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .question-num{font-family:'Baloo 2',cursive;font-size:.8rem;font-weight:800;color:var(--fire);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .question-text{font-family:'Baloo 2',cursive;font-size:1.25rem;font-weight:700;color:var(--dark);line-height:1.45;margin-bottom:22px}
  .options{display:flex;flex-direction:column;gap:12px}
  .option-btn{background:var(--sand);border:2.5px solid transparent;border-radius:16px;padding:14px 18px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--dark);cursor:pointer;text-align:left;transition:all .2s;display:flex;align-items:center;gap:12px;position:relative}
  .option-btn:hover:not(:disabled){border-color:var(--fire);background:#FFF8F0;transform:translateX(4px)}
  .option-btn.correct{background:#ECFDF5;border-color:var(--green);color:#1a5c34;animation:correctPop .4s cubic-bezier(.34,1.56,.64,1)}
  .option-btn.wrong{background:#FFF0F0;border-color:var(--red);color:#7a2020;animation:shake .4s ease}
  .option-btn.revealed-correct{background:#ECFDF5;border-color:var(--green);opacity:.7}
  .option-btn:disabled{cursor:default}
  .option-letter{font-size:.85rem;font-weight:800;position:absolute;left:18px;color:var(--fire);opacity:.6}
  .option-text{padding-left:20px}
  @keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .feedback{margin-top:18px;padding:14px 18px;border-radius:16px;font-size:.95rem;font-weight:700;line-height:1.5;display:none}
  .feedback.show{display:flex;gap:10px;align-items:flex-start;animation:fadeIn .3s ease}
  .feedback.correct-feedback{background:#ECFDF5;color:#1a5c34;border:2px solid #86efac}
  .feedback.wrong-feedback{background:#FFF0F0;color:#7a2020;border:2px solid #fca5a5}
  .feedback-icon{font-size:1.4rem;flex-shrink:0}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .next-btn{display:none;margin-top:20px;width:100%;padding:16px;background:linear-gradient(135deg,var(--dark),#5C2800);color:var(--fire-light);font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;border:none;border-radius:16px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(61,26,0,.3)}
  .next-btn:hover{transform:translateY(-2px)}
  .next-btn.show{display:block;animation:fadeIn .3s ease}
  .score-screen{text-align:center;background:var(--stone);border-radius:24px;padding:36px 24px;box-shadow:0 8px 32px rgba(61,26,0,.15);border:2px solid rgba(232,93,4,.2);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;display:none}
  .score-screen.show{display:block}
  .trophy{font-size:5rem;margin-bottom:12px;animation:flicker 1.5s ease-in-out infinite}
  .score-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
  .score-number{font-family:'Baloo 2',cursive;font-size:3.5rem;font-weight:800;color:var(--fire);line-height:1}
  .score-sub{font-size:.95rem;color:var(--dark);opacity:.75;margin-top:4px}
  .score-message{margin:20px 0;padding:18px;background:linear-gradient(135deg,#FFE8CC,#FFD09A);border-radius:16px;font-size:1rem;font-weight:700;color:var(--dark);border-left:5px solid var(--fire);line-height:1.6}
  .verse-box{background:var(--sand);border-radius:16px;padding:16px 18px;font-size:.9rem;color:var(--dark);font-style:italic;line-height:1.6;margin-bottom:24px;opacity:.85}
  .verse-ref{font-style:normal;font-weight:700;display:block;margin-top:6px;color:var(--fire);font-size:.85rem}
  .stars{font-size:2rem;letter-spacing:4px;margin:12px 0}
  .restart-btn{padding:16px 36px;background:linear-gradient(135deg,var(--fire),#C44D00);color:#fff;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;border:none;border-radius:16px;cursor:pointer;box-shadow:0 4px 16px rgba(232,93,4,.4);transition:all .2s}
  .restart-btn:hover{transform:translateY(-2px)}
  .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:100}
  .confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 2.5s ease-in forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="spark">🔥</div><div class="spark">✨</div><div class="spark">🌿</div><div class="spark">⛰️</div>
<div class="container">
  <div class="header">
    <span class="main-emoji">🔥</span>
    <h1>The Bush That Would Not Burn</h1>
    <p class="subtitle">A Story from Exodus 3:1–6</p>
    <span class="scripture-badge">📖 Exodus 3:1–6</span>
  </div>
  <div class="progress-label" id="progressLabel">Question 1 of 8</div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="card" id="quizCard">
    <div class="question-num" id="questionNum">Question 1</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedback"><span class="feedback-icon" id="feedbackIcon"></span><span id="feedbackText"></span></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>
  <div class="score-screen" id="scoreScreen">
    <div class="trophy" id="trophyEmoji">🏆</div>
    <div class="stars" id="starsDisplay"></div>
    <div class="score-title" id="scoreTitle">Well Done!</div>
    <div class="score-number" id="scoreNumber"></div>
    <div class="score-sub">questions answered correctly</div>
    <div class="score-message" id="scoreMessage"></div>
    <div class="verse-box">"Take off your sandals, for the place where you are standing is holy ground."<span class="verse-ref">— Exodus 3:5</span></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again!</button>
  </div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>
<script>
const questions=[
  {question:"How did the story describe the bush at the beginning?",options:["Tall and beautiful with bright flowers","Thorny, small, and completely ordinary","A large tree with spreading branches","A magical plant that glowed at night"],answer:1,feedback:{correct:"Exactly! 🌿 The bush was thorny, small, growing out of a crack in dry rocky ground — the most ordinary bush on the mountain. Yet God chose it!",wrong:"The bush was thorny, small, completely unremarkable — growing stubbornly out of dry rocky ground. Nothing special about it at all. Until God arrived."}},
  {question:"What had Moses been doing for the forty years before the burning bush?",options:["He had been ruling as a prince in Egypt","He had been a shepherd, far from his people","He had been building a great city","He had been sailing the sea"],answer:1,feedback:{correct:"Right! 🐑 Moses had gone from prince to fugitive to shepherd. He thought his story was over. But God had other plans!",wrong:"For forty long years, Moses had been a shepherd — an old man far from his people, far from everything, thinking his best days were behind him."}},
  {question:"What was extraordinary about the fire in the bush?",options:["It was bright purple instead of orange","The bush burned but was not consumed or destroyed","It made a beautiful singing sound","It appeared every morning at sunrise"],answer:1,feedback:{correct:"Yes! 🔥 The flames leapt gold and red and white — but the branches didn't blacken, the leaves didn't shrivel. It was a fire that revealed, not destroyed!",wrong:"This was no ordinary fire — it burned and burned, gold and red and white at the heart, but nothing was consumed. The bush stayed whole."}},
  {question:"What did Moses decide to do when he saw the burning bush?",options:["He ran away as fast as he could","He turned aside to look more closely","He threw water on it to put it out","He called out to God immediately"],answer:1,feedback:{correct:"Beautiful! 👀 Moses turned aside — he chose to stop, to look, to go closer. And the Scripture says: when God saw that Moses turned, God called to him!",wrong:"Moses turned aside to look more closely. That small decision — to stop and pay attention — changed everything. God waited until Moses turned."}},
  {question:"What did God say Moses must do before coming closer?",options:["Wash his hands in the stream","Take off his sandals, for he stood on holy ground","Cover his eyes with his cloak","Build an altar with seven stones"],answer:1,feedback:{correct:"Yes! 👣 'Take off your sandals — the place where you are standing is holy ground.' An ordinary hillside, made holy simply because God was there.",wrong:"God said: 'Take off your sandals, for the place where you are standing is holy ground.' The rocky hillside Moses had walked a hundred times was suddenly a holy place."}},
  {question:"How did Moses respond when God spoke to him?",options:["He laughed and danced with joy","He hid his face, afraid to look at God","He argued and said God had the wrong person","He walked away and kept tending his sheep"],answer:1,feedback:{correct:"Right! 🙏 Moses hid his face in his hands. He was afraid to look at God — and that reverence was the right response to meeting the Holy One.",wrong:"Moses hid his face, afraid to look at God. Standing before the Holy One — even a brave prophet knows to bow in reverence."}},
  {question:"Who did God say He was when He spoke from the bush?",options:["'I am the God of the mountain and the fire.'","'I am the God of Abraham, Isaac, and Jacob.'","'I am the great King of all nations.'","'I am the Spirit of the desert wind.'"],answer:1,feedback:{correct:"Exactly! ✨ God named Himself through Moses's ancestors — the God who made promises and kept them. He was saying: I remember. I know your family. I am faithful.",wrong:"God said: 'I am the God of your father — the God of Abraham, Isaac, and Jacob.' Names Moses had heard as a child. God was saying: I remember. I keep my promises."}},
  {question:"What is the big message of the burning bush story?",options:["You need to build a special place before God will visit you","God comes to ordinary places to find ordinary people for extraordinary things","Moses was chosen because he was the strongest shepherd","The desert is a holy place but cities are not"],answer:1,feedback:{correct:"Yes! 🌟 God didn't come to a palace or a temple. He came to a hillside, a bush, an old shepherd. Ordinary places, ordinary people — that's where God shows up!",wrong:"The great message: God comes to ordinary places to find ordinary people for extraordinary things. Anywhere God chooses to come is holy ground — even where you are right now."}}
];
let currentQ=0,score=0,answered=false;
function loadQuestion(){answered=false;const q=questions[currentQ];const total=questions.length;document.getElementById('questionNum').textContent=`Question ${currentQ+1}`;document.getElementById('questionText').textContent=q.question;document.getElementById('progressLabel').textContent=`Question ${currentQ+1} of ${total}`;document.getElementById('progressBar').style.width=`${(currentQ/total)*100}%`;const container=document.getElementById('optionsContainer');container.innerHTML='';const letters=['A','B','C','D'];q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span>`;btn.onclick=()=>selectAnswer(i);container.appendChild(btn);});const fb=document.getElementById('feedback');fb.className='feedback';fb.classList.remove('show');document.getElementById('nextBtn').classList.remove('show');const card=document.getElementById('quizCard');card.style.animation='none';card.offsetHeight;card.style.animation='cardIn .4s cubic-bezier(.34,1.56,.64,1) both';}
function selectAnswer(index){if(answered)return;answered=true;const q=questions[currentQ];const buttons=document.querySelectorAll('.option-btn');buttons.forEach(b=>b.disabled=true);const isCorrect=index===q.answer;if(isCorrect)score++;buttons[index].classList.add(isCorrect?'correct':'wrong');document.getElementById('feedbackIcon').textContent=isCorrect?'🎉':'🤔';document.getElementById('feedbackText').textContent=isCorrect?q.feedback.correct:q.feedback.wrong;if(!isCorrect)buttons[q.answer].classList.add('revealed-correct');document.getElementById('feedback').className=`feedback ${isCorrect?'correct-feedback':'wrong-feedback'} show`;const nextBtn=document.getElementById('nextBtn');nextBtn.textContent=currentQ<questions.length-1?'Next Question →':'See My Score! 🌟';nextBtn.classList.add('show');}
function nextQuestion(){currentQ++;if(currentQ<questions.length)loadQuestion();else showScore();}
function showScore(){document.getElementById('quizCard').style.display='none';document.getElementById('progressLabel').style.display='none';document.querySelector('.progress-wrap').style.display='none';const screen=document.getElementById('scoreScreen');screen.classList.add('show');const pct=score/questions.length;document.getElementById('scoreNumber').textContent=`${score} / ${questions.length}`;let trophy,stars,title,message;if(pct===1){trophy='🏆';stars='⭐⭐⭐⭐⭐';title='Blazing Brilliant!';message="You know every flame of this story! Like Moses who turned aside to look, you paid close attention and didn't miss a single detail. Take off your shoes — you're standing on holy ground right now!";launchConfetti();}else if(pct>=.75){trophy='🔥';stars='⭐⭐⭐⭐';title='Wonderful!';message="You turned aside and looked closely at this story! Read it once more and every detail will be clear. Keep going!";}else if(pct>=.5){trophy='😊';stars='⭐⭐⭐';title='Good Effort!';message="The bush kept burning until Moses turned to look! Read the story again — God is patient, and so is a good story.";}else{trophy='💛';stars='⭐⭐';title='Keep Looking!';message="Moses almost walked past the burning bush! Don't walk past this story — read it again and come back. Something extraordinary is waiting. 🔥";}document.getElementById('trophyEmoji').textContent=trophy;document.getElementById('starsDisplay').textContent=stars;document.getElementById('scoreTitle').textContent=title;document.getElementById('scoreMessage').textContent=message;}
function launchConfetti(){const wrap=document.getElementById('confettiWrap');const colors=['#E85D04','#FFBA08','#4CAF72','#7B4A1E','#E05555','#3D1A00'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*1.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;wrap.appendChild(p);setTimeout(()=>p.remove(),4000);}}
function restartQuiz(){currentQ=0;score=0;answered=false;document.getElementById('scoreScreen').classList.remove('show');document.getElementById('quizCard').style.display='block';document.getElementById('progressLabel').style.display='block';document.querySelector('.progress-wrap').style.display='block';loadQuestion();}
loadQuestion();
</script>
</body>
</html>
