<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Breath of God – Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #5BA4CF;--sky-light: #B3D9F2;--cloud: #F0F8FF;--gold: #D4930A;
    --green: #4CAF72;--red: #E05555;--dark: #1A3550;--white: #FAFEFF;--sand: #EAF4FB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: linear-gradient(160deg, #C9E8F5 0%, #87CEEB 50%, #5BA4CF 100%); min-height: 100vh; overflow-x: hidden; }
  .leaf { position: fixed; font-size: 2rem; opacity: 0.2; pointer-events: none; animation: float 7s ease-in-out infinite; }
  .leaf:nth-child(1){top:5%;left:3%;animation-delay:0s}
  .leaf:nth-child(2){top:25%;right:4%;animation-delay:1.5s;font-size:1.5rem}
  .leaf:nth-child(3){bottom:20%;left:5%;animation-delay:3s;font-size:1.8rem}
  .leaf:nth-child(4){bottom:8%;right:6%;animation-delay:2s}
  @keyframes float{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-18px) rotate(5deg)}}
  .container{max-width:680px;margin:0 auto;padding:24px 20px 60px}
  .header{text-align:center;margin-bottom:32px;animation:dropIn .6s cubic-bezier(.34,1.56,.64,1) both}
  @keyframes dropIn{from{transform:translateY(-40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .main-emoji{font-size:4.5rem;display:block;margin-bottom:8px;animation:sway 4s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  h1{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:var(--dark);line-height:1.2;text-shadow:2px 2px 0 rgba(255,255,255,0.6)}
  .subtitle{font-size:1rem;color:var(--dark);opacity:.75;margin-top:6px;font-weight:600}
  .scripture-badge{display:inline-block;background:var(--dark);color:var(--sky-light);font-size:.75rem;font-weight:700;padding:4px 14px;border-radius:20px;margin-top:10px;letter-spacing:.5px}
  .progress-wrap{background:rgba(255,255,255,.45);border-radius:12px;height:12px;margin-bottom:24px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.1)}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--sky),var(--sky-light));border-radius:12px;transition:width .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 2px 8px rgba(91,164,207,.4)}
  .progress-label{text-align:center;font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:10px;opacity:.8}
  .card{background:var(--white);border-radius:24px;padding:28px 24px;box-shadow:0 8px 32px rgba(26,53,80,.15),0 2px 8px rgba(0,0,0,.08);animation:cardIn .4s cubic-bezier(.34,1.56,.64,1) both;border:2px solid rgba(91,164,207,.2)}
  @keyframes cardIn{from{transform:scale(.92) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .question-num{font-family:'Baloo 2',cursive;font-size:.8rem;font-weight:800;color:var(--sky);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .question-text{font-family:'Baloo 2',cursive;font-size:1.25rem;font-weight:700;color:var(--dark);line-height:1.45;margin-bottom:22px}
  .options{display:flex;flex-direction:column;gap:12px}
  .option-btn{background:var(--sand);border:2.5px solid transparent;border-radius:16px;padding:14px 18px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--dark);cursor:pointer;text-align:left;transition:all .2s ease;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
  .option-btn:hover:not(:disabled){border-color:var(--sky);background:#E8F4FD;transform:translateX(4px);box-shadow:0 4px 12px rgba(91,164,207,.25)}
  .option-btn.correct{background:#ECFDF5;border-color:var(--green);color:#1a5c34;animation:correctPop .4s cubic-bezier(.34,1.56,.64,1)}
  .option-btn.wrong{background:#FFF0F0;border-color:var(--red);color:#7a2020;animation:shake .4s ease}
  .option-btn.revealed-correct{background:#ECFDF5;border-color:var(--green);opacity:.7}
  .option-btn:disabled{cursor:default}
  .option-letter{font-size:.85rem;font-weight:800;position:absolute;left:18px;color:var(--sky);opacity:.6}
  .option-text{padding-left:20px}
  @keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .feedback{margin-top:18px;padding:14px 18px;border-radius:16px;font-size:.95rem;font-weight:700;line-height:1.5;animation:fadeIn .3s ease;display:none}
  .feedback.show{display:flex;gap:10px;align-items:flex-start}
  .feedback.correct-feedback{background:#ECFDF5;color:#1a5c34;border:2px solid #86efac}
  .feedback.wrong-feedback{background:#FFF0F0;color:#7a2020;border:2px solid #fca5a5}
  .feedback-icon{font-size:1.4rem;flex-shrink:0}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .next-btn{display:none;margin-top:20px;width:100%;padding:16px;background:linear-gradient(135deg,var(--dark),#2a5070);color:var(--sky-light);font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;border:none;border-radius:16px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(26,53,80,.3);letter-spacing:.5px}
  .next-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,53,80,.4)}
  .next-btn.show{display:block;animation:fadeIn .3s ease}
  .score-screen{text-align:center;background:var(--white);border-radius:24px;padding:36px 24px;box-shadow:0 8px 32px rgba(26,53,80,.15);border:2px solid rgba(91,164,207,.2);animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) both;display:none}
  .score-screen.show{display:block}
  .trophy{font-size:5rem;margin-bottom:12px;animation:sway 2s ease-in-out infinite}
  .score-title{font-family:'Baloo 2',cursive;font-size:1.8rem;font-weight:800;color:var(--dark);margin-bottom:8px}
  .score-number{font-family:'Baloo 2',cursive;font-size:3.5rem;font-weight:800;color:var(--sky);line-height:1;text-shadow:3px 3px 0 rgba(91,164,207,.2)}
  .score-sub{font-size:.95rem;color:var(--dark);opacity:.75;margin-top:4px}
  .score-message{margin:20px 0;padding:18px;background:linear-gradient(135deg,#E0F3FD,#C9E8F5);border-radius:16px;font-size:1rem;font-weight:700;color:var(--dark);border-left:5px solid var(--sky);line-height:1.6}
  .verse-box{background:var(--sand);border-radius:16px;padding:16px 18px;font-size:.9rem;color:var(--dark);font-style:italic;line-height:1.6;margin-bottom:24px;opacity:.85}
  .verse-ref{font-style:normal;font-weight:700;display:block;margin-top:6px;color:var(--sky);font-size:.85rem}
  .stars{font-size:2rem;letter-spacing:4px;margin:12px 0}
  .restart-btn{padding:16px 36px;background:linear-gradient(135deg,var(--sky),#4A90D9);color:var(--white);font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;border:none;border-radius:16px;cursor:pointer;box-shadow:0 4px 16px rgba(91,164,207,.4);transition:all .2s}
  .restart-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(91,164,207,.5)}
  .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:100}
  .confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 2.5s ease-in forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  @media(max-width:480px){h1{font-size:1.6rem}.question-text{font-size:1.1rem}.option-btn{padding:12px 16px;font-size:.95rem}}
</style>
</head>
<body>
<div class="leaf">💨</div>
<div class="leaf">🌿</div>
<div class="leaf">☁️</div>
<div class="leaf">🍃</div>
<div class="container">
  <div class="header">
    <span class="main-emoji">🌬️</span>
    <h1>The Breath of God</h1>
    <p class="subtitle">Why the Wind Has No Color</p>
    <span class="scripture-badge">📖 Genesis 1:2 · John 3:8</span>
  </div>
  <div class="progress-label" id="progressLabel">Question 1 of 8</div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="card" id="quizCard">
    <div class="question-num" id="questionNum">Question 1</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback" id="feedback"><span class="feedback-icon" id="feedbackIcon"></span><span id="feedbackText"></span></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>
  <div class="score-screen" id="scoreScreen">
    <div class="trophy" id="trophyEmoji">🏆</div>
    <div class="stars" id="starsDisplay"></div>
    <div class="score-title" id="scoreTitle">Well Done!</div>
    <div class="score-number" id="scoreNumber"></div>
    <div class="score-sub">questions answered correctly</div>
    <div class="score-message" id="scoreMessage"></div>
    <div class="verse-box">"The wind blows where it wishes, and you hear its sound, but you do not know where it comes from or where it goes."<span class="verse-ref">— John 3:8</span></div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again!</button>
  </div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>
<script>
const questions = [
  {question:"When God was creating the world, what did He give to almost every creature and flower?",options:["A name","A color","A sound","A home"],answer:1,feedback:{correct:"Yes! 🎨 God painted everything — from the peacock's feathers to the rose's red — but the Wind was still waiting for its color.",wrong:"God gave every creature and flower a color — the peacock got shimmering blue-green, roses got red, and sunflowers got bright yellow!"}},
  {question:"What did the Wind want from God more than anything?",options:["To be stronger than the storm","To have its own color","To become visible like water","To make a sound like thunder"],answer:1,feedback:{correct:"Right! 🌈 The Wind watched all the colors being given out and desperately wanted its own — silver like moonlight, gold like morning, or deep royal blue.",wrong:"The Wind watched every creature receive a color and longed for its own. Would it be silver? Gold? Deep blue?"}},
  {question:"What did God give the Wind instead of a color?",options:["A beautiful song","God's own breath and presence","A special shape","The power to make rain"],answer:1,feedback:{correct:"Beautiful! 🕊️ God breathed into the Wind His very own breath — His presence and nearness — something no color could ever carry.",wrong:"God gave the Wind something far greater than color — His own breath and presence. Wherever the Wind goes, it carries God's nearness."}},
  {question:"What was the Wind's special mission?",options:["To paint the sky at sunset","To cool the weary, rock babies to sleep, and carry prayers upward","To blow the clouds across the sky","To make music in the trees"],answer:1,feedback:{correct:"Wonderful! 🌟 The Wind would whisper to everyone: 'I am here. I am near. You are not alone.' What a beautiful calling!",wrong:"God told the Wind: cool the weary traveller, rock babies to sleep, carry prayers like seeds toward the sun — and always whisper 'I am here.'"}},
  {question:"When the Wind passed over Elijah on the mountain, what happened after the mighty wind?",options:["A great flood came","An earthquake came, then fire, then a still small voice","God appeared in a rainbow","It began to rain for forty days"],answer:1,feedback:{correct:"Exactly right! ⛰️ The wind was strong enough to split rocks, then came the earthquake, then fire — and after all of that, a still small voice where God truly was.",wrong:"After the mighty wind came an earthquake, then fire — and after the fire, a still small voice. That quiet whisper was where God was."}},
  {question:"In the story, what did the Wind do for the little girl's kite?",options:["It tore the kite apart","It lifted the kite free from the tree where it was tangled","It carried the kite to another country","It painted the kite with colors"],answer:1,feedback:{correct:"Yes! 🪁 The Wind breathed and breathed until the tangled kite spun free and soared upward — and the girl ran after it laughing!",wrong:"The Wind found the little girl's kite tangled in a tree and breathed it free until it soared up into the sky again!"}},
  {question:"What did the Wind say when the child asked why it had no color?",options:["'God forgot to give me one.'","'I am like love — you cannot see it, but you always know when it is there.'","'My color is invisible blue.'","'Colors are only for things that are not important.'"],answer:1,feedback:{correct:"Perfect! 💛 'I am like love.' You cannot see love, but you always feel it — warm and real and true. The Wind carries that same invisible, powerful presence.",wrong:"The Wind answered: 'I am like love. You cannot see love — but you always know when it is there.'"}},
  {question:"What is the big message of this story?",options:["Colors are the most important thing God gives","God is invisible but always near, just like the wind on your face","The wind is stronger than any storm","Being unseen means being unimportant"],answer:1,feedback:{correct:"Yes! 🌬️ God is Spirit — invisible but wonderfully, powerfully real. Every time the wind touches your face, remember: I am here. I am near. You are not alone.",wrong:"The message is this: God is like the wind — you cannot see Him, but you can always feel His presence. He is always near."}}
];
let currentQ=0,score=0,answered=false;
function loadQuestion(){
  answered=false;const q=questions[currentQ];const total=questions.length;
  document.getElementById('questionNum').textContent=`Question ${currentQ+1}`;
  document.getElementById('questionText').textContent=q.question;
  document.getElementById('progressLabel').textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById('progressBar').style.width=`${(currentQ/total)*100}%`;
  const container=document.getElementById('optionsContainer');container.innerHTML='';
  const letters=['A','B','C','D'];
  q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span>`;btn.onclick=()=>selectAnswer(i);container.appendChild(btn);});
  const fb=document.getElementById('feedback');fb.className='feedback';fb.classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');
  const card=document.getElementById('quizCard');card.style.animation='none';card.offsetHeight;card.style.animation='cardIn .4s cubic-bezier(.34,1.56,.64,1) both';
}
function selectAnswer(index){
  if(answered)return;answered=true;
  const q=questions[currentQ];const buttons=document.querySelectorAll('.option-btn');const feedback=document.getElementById('feedback');const nextBtn=document.getElementById('nextBtn');
  buttons.forEach(b=>b.disabled=true);
  const isCorrect=index===q.answer;if(isCorrect)score++;
  buttons[index].classList.add(isCorrect?'correct':'wrong');
  document.getElementById('feedbackIcon').textContent=isCorrect?'🎉':'🤔';
  document.getElementById('feedbackText').textContent=isCorrect?q.feedback.correct:q.feedback.wrong;
  if(!isCorrect)buttons[q.answer].classList.add('revealed-correct');
  feedback.className=`feedback ${isCorrect?'correct-feedback':'wrong-feedback'} show`;
  nextBtn.textContent=currentQ<questions.length-1?'Next Question →':'See My Score! 🌟';
  nextBtn.classList.add('show');
}
function nextQuestion(){currentQ++;if(currentQ<questions.length)loadQuestion();else showScore();}
function showScore(){
  document.getElementById('quizCard').style.display='none';
  document.getElementById('progressLabel').style.display='none';
  document.querySelector('.progress-wrap').style.display='none';
  const screen=document.getElementById('scoreScreen');screen.classList.add('show');
  const total=questions.length;const pct=score/total;
  document.getElementById('scoreNumber').textContent=`${score} / ${total}`;
  let trophy,stars,title,message;
  if(pct===1){trophy='🏆';stars='⭐⭐⭐⭐⭐';title='Amazing! Perfect Score!';message="You know every breath of this beautiful story! Just like the wind carries God's presence everywhere, your knowledge of this story is complete. The Lord is so near — can you feel Him?";launchConfetti();}
  else if(pct>=.75){trophy='🌟';stars='⭐⭐⭐⭐';title='Wonderful!';message="You listened well to the Wind's story! A few more reads and you'll catch every gentle whisper. Keep going — you're doing beautifully!";}
  else if(pct>=.5){trophy='😊';stars='⭐⭐⭐';title='Good Try!';message="The Wind doesn't give up, and neither should you! Read the story again and come back. Every time you read, you'll feel God's presence a little more clearly.";}
  else{trophy='💛';stars='⭐⭐';title='Keep Listening!';message="Every whisper takes practice to hear! Read the story once more and try again. Remember — the Wind is always speaking. You just need to be still and listen. 🌬️";}
  document.getElementById('trophyEmoji').textContent=trophy;document.getElementById('starsDisplay').textContent=stars;document.getElementById('scoreTitle').textContent=title;document.getElementById('scoreMessage').textContent=message;
}
function launchConfetti(){
  const wrap=document.getElementById('confettiWrap');const colors=['#5BA4CF','#B3D9F2','#4CAF72','#D4930A','#E05555','#1A3550'];
  for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*1.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;wrap.appendChild(p);setTimeout(()=>p.remove(),4000);}
}
function restartQuiz(){
  currentQ=0;score=0;answered=false;
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('quizCard').style.display='block';
  document.getElementById('progressLabel').style.display='block';
  document.querySelector('.progress-wrap').style.display='block';
  loadQuestion();
}
loadQuestion();
</script>
</body>
</html>
